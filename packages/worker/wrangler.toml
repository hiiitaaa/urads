name = "urads-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[[d1_databases]]
binding = "DB"
database_name = "urads-db"
database_id = "6cba5076-dfb4-4dbc-b46b-caaeba7c723a"
migrations_dir = "migrations/core"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "urads-media"

[vars]
THREADS_APP_ID = "941586355006583"
THREADS_REDIRECT_URI = "https://localhost:8890/callback"
# THREADS_APP_SECRET と ENCRYPTION_KEY は .dev.vars（ローカル）/ wrangler secret（本番）で管理
# 設定方法: npx wrangler secret put THREADS_APP_SECRET
#            npx wrangler secret put ENCRYPTION_KEY

[triggers]
crons = ["* * * * *"]
